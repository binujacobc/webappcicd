version: 0.2

env:
  variables:
    NODE_ENV: "production"

phases:
  install:
    runtime-versions:
      nodejs: 18
    commands:
      - echo "Installing dependencies..."
      - cd frontend
      - npm ci

  build:
    commands:
      - echo "Building Vue.js application..."
      - cd frontend
      - npm run build

  post_build:
    commands:
      - echo "Deploying to S3..."
      - cd frontend
      - aws s3 sync dist/ s3://${S3_BUCKET_NAME} --delete --cache-control "public, max-age=31536000, immutable" --exclude "index.html"
      - aws s3 cp dist/index.html s3://${S3_BUCKET_NAME}/index.html --cache-control "no-cache, no-store, must-revalidate"
      - echo "Invalidating CloudFront cache..."
      - aws cloudfront create-invalidation --distribution-id ${CLOUDFRONT_DISTRIBUTION_ID} --paths "/*"
      - echo "Deployment complete."

cache:
  paths:
    - "frontend/node_modules/**/*"
